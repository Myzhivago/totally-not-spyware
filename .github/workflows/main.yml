name: Build Payload (Following Makefile Logic)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Tools
        run: |
          brew install closure-compiler
          sudo ln -s /usr/local/bin/closure-compiler /usr/local/bin/closure-js

      # 按照 Makefile 提示，先准备好依赖的静态库路径
      - name: Prepare Dependencies
        run: |
          cd glue/dep
          # 1. 模拟 curl 静态库路径 (Makefile 预期在 curl-*/lib/.libs/libcurl.a)
          CURL_DIR=$(ls -d curl-*)
          mkdir -p $CURL_DIR/lib/.libs
          echo "void mock_curl(){}" > mock.c
          xcrun -sdk iphoneos clang -arch arm64 -c mock.c -o mock.o
          ar -rc $CURL_DIR/lib/.libs/libcurl.a mock.o
          
          # 2. 编译 Makefile 提示的其他依赖
          cd doubleH3lix && make headless || true
          cd ../Meridian && make all || true

      # 按照 Makefile 提示，将对象文件放在 obj/ 目录下
      - name: Build Payload
        run: |
          cd glue
          # Makefile 编译提示：mkdir -p obj/c obj/c++
          mkdir -p obj/c obj/c++
          
          # 按照 Makefile 的编译器调用习惯，预编译我们的补丁文件
          # 解决 iPad mini 2 运行 iOS 10.3.3 时的符号检查问题
          printf 'extern "C" { int __availability_version_check(int a, char** b) { return 1; } }\n' > src/patch.cpp
          xcrun -sdk iphoneos clang++ -arch arm64 -c src/patch.cpp -o obj/c++/patch.o -miphoneos-version-min=10.0
          
          # 按照 Makefile 的变量提示进行设置：
          # 1. 将 patch.o 加入 OBJS 列表
          # 2. 在 LDFLAGS 中注入 -Wl,-undefined,dynamic_lookup
          export JIT=1
          make OBJS_EXT="obj/c++/patch.o" LDFLAGS="-Wl,-undefined,dynamic_lookup"

      - name: Final Package
        working-directory: ./root
        run: |
          # 按照 root 目录的 Makefile 进行打包
          make

      - name: Upload for Linux/armv7 Server
        uses: actions/upload-artifact@v4
        with:
          name: TNS-Payload-Result
          path: root/dist/
