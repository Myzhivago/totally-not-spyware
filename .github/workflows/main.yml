name: Build Totally Not Spyware (armv7)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Build Environment
        run: |
          # 1. 安装前端压缩工具
          brew install closure-compiler
          sudo ln -s /usr/local/bin/closure-compiler /usr/local/bin/closure-js
          
          # 2. 预存 SDK 和 编译器路径到环境变量
          echo "SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)" >> $GITHUB_ENV
          echo "CLANG=$(xcrun --sdk iphoneos --find clang)" >> $GITHUB_ENV
          echo "CLANGXX=$(xcrun --sdk iphoneos --find clang++)" >> $GITHUB_ENV

      # 第一步：编译 curl (针对 armv7)
      - name: Build Curl (armv7)
        run: |
          CURL_DIR=$(ls -d glue/dep/curl-*)
          cd $CURL_DIR
          
          # 核心修复：定义交叉编译环境
          export CC="${{ env.CLANG }}"
          export CFLAGS="-arch armv7 -isysroot ${{ env.SDK_PATH }} -miphoneos-version-min=7.0"
          export LDFLAGS="-arch armv7 -isysroot ${{ env.SDK_PATH }}"
          
          # cross_compiling=yes 是解决 exit 77 的关键，防止它尝试运行测试程序
          ./configure --host=armv7-apple-darwin \
                      --with-darwinssl \
                      --enable-static \
                      --disable-shared \
                      --with-random=/dev/urandom \
                      CC="$CC" \
                      CFLAGS="$CFLAGS" \
                      LDFLAGS="$LDFLAGS" \
                      cross_compiling=yes
          
          make -j$(sysctl -n hw.ncpu)

      # 第二步：编译 DoubleH3lix 静态库
      - name: Build DoubleH3lix (armv7)
        run: |
          cd glue/dep/doubleH3lix
          make headless ARCH=armv7 CFLAGS="-arch armv7 -isysroot ${{ env.SDK_PATH }} -miphoneos-version-min=7.0"

      # 第三步：编译 Meridian 静态库
      - name: Build Meridian (armv7)
        run: |
          cd glue/dep/Meridian
          # 覆盖 Makefile 中的编译命令
          make all IGCC="${{ env.CLANGXX }} -arch armv7 -isysroot ${{ env.SDK_PATH }} -miphoneos-version-min=7.0"

      # 第四步：编译 Payload (glue)
      - name: Build Payload (armv7)
        run: |
          cd glue
          export JIT=1
          # 确保链接阶段也使用正确的架构和 SDK
          make IGXX="${{ env.CLANGXX }} -arch armv7 -isysroot ${{ env.SDK_PATH }} -miphoneos-version-min=7.0"

      # 第五步：最终整合打包 (root)
      - name: Final Build for nginx
        working-directory: ./root
        run: |
          # 此时会调用 closure-js 压缩资源并生成 dist 目录
          make

      # 第六步：上传产物
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TNS-armv7-dist
          path: root/dist/
