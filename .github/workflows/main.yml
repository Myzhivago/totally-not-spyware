name: Build Totally Not Spyware (armv7)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Build Environment
        run: |
          # 1. 安装前端工具
          brew install closure-compiler
          sudo ln -s /usr/local/bin/closure-compiler /usr/local/bin/closure-js
          
          # 2. 获取 iOS SDK 路径并存入环境变量
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK_PATH=$SDK_PATH" >> $GITHUB_ENV
          
          # 3. 获取编译器路径
          CLANG_PATH=$(xcrun --sdk iphoneos --find clang)
          echo "CLANG_PATH=$CLANG_PATH" >> $GITHUB_ENV

      # 第一步：编译 curl (针对 armv7)
      - name: Build Curl (armv7)
        run: |
          CURL_DIR=$(ls -d glue/dep/curl-*)
          cd $CURL_DIR
          
          # 强制指定编译器和所有标志
          export CC="${{ env.CLANG_PATH }}"
          export CFLAGS="-arch armv7 -isysroot ${{ env.SDK_PATH }} -miphoneos-version-min=7.0"
          export LDFLAGS="-arch armv7 -isysroot ${{ env.SDK_PATH }}"
          
          # 注意：cross_compiling=yes 强制跳过运行测试，这是解决 exit 77 的核心
          ./configure --host=armv7-apple-darwin \
                      --with-darwinssl \
                      --enable-static \
                      --disable-shared \
                      --with-random=/dev/urandom \
                      CC="$CC" \
                      CFLAGS="$CFLAGS" \
                      LDFLAGS="$LDFLAGS" \
                      cross_compiling=yes
          
          make -j$(sysctl -n hw.ncpu)

      # 第二步：编译 DoubleH3lix (armv7)
      - name: Build DoubleH3lix
        run: |
          cd glue/dep/doubleH3lix
          make headless ARCH=armv7 CFLAGS="-arch armv7 -isysroot ${{ env.SDK_PATH }} -miphoneos-version-min=7.0"

      # 第三步：编译 Meridian (armv7)
      - name: Build Meridian
        run: |
          cd glue/dep/Meridian
          # 覆盖 Makefile 中的编译器和参数
          make all IGCC="${{ env.CLANG_PATH }} -arch armv7 -isysroot ${{ env.SDK_PATH }} -miphoneos-version-min=7.0"

      # 第四步：编译 Payload (glue)
      - name: Build Payload
        run: |
          cd glue
          export JIT=1
          # 确保链接器也使用正确的 SDK 路径
          make IGXX="${{ env.CLANG_PATH }} -arch armv7 -isysroot ${{ env.SDK_PATH }} -miphoneos-version-min=7.0"

      # 第五步：生成部署到 nginx 的产物 (root)
      - name: Final Build for nginx
        working-directory: ./root
        run: |
          make

      # 第六步：上传
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TNS-armv7-dist
          path: root/dist/
