name: Build for iOS 10.3.3 (Final Fix)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Tools
        run: |
          brew install closure-compiler
          sudo ln -s /usr/local/bin/closure-compiler /usr/local/bin/closure-js

      - name: Build Curl
        run: |
          cd glue/dep/curl-*
          export SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          ./configure --host=arm-apple-darwin --with-darwinssl --enable-static --disable-shared --with-random=/dev/urandom \
            CC="xcrun -sdk iphoneos clang -arch arm64 -miphoneos-version-min=10.0 -isysroot $SDK_PATH"
          make -j$(sysctl -n hw.ncpu)

      - name: Build Dependencies
        run: |
          cd glue/dep/doubleH3lix && make headless
          cd ../Meridian && make all

      - name: Patch and Build Payload
        run: |
          cd glue
          # 1. 物理创建必要的目录，防止 "No such file or directory"
          mkdir -p obj/c obj/c++
          
          # 2. 注入缺失符号补丁 (同时处理单/双下划线)
          printf 'extern "C" { int __availability_version_check(int a, char** b) { return 1; } int _availability_version_check(int a, char** b) { return 1; } }\n' > src/compat.cpp
          
          # 3. 手动编译补丁文件 (显式指定输出路径)
          xcrun -sdk iphoneos clang++ -arch arm64 -c src/compat.cpp -o obj/c++/compat.o -miphoneos-version-min=10.0
          
          # 4. 修改 Makefile：将补丁文件加入链接列表，并强制忽略未定义符号
          # 我们把 compat.o 塞进链接命令中
          sed -i '' 's/$(CXX) $(LDFLAGS) -o $@/$(CXX) $(LDFLAGS) obj\/c++\/compat.o -Wl,-undefined,dynamic_lookup -o $@/g' Makefile
          
          # 5. 执行编译
          export JIT=1
          make

      - name: Final Package for Linux Nginx
        working-directory: ./root
        run: |
          make

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TNS-iOS10-Dist
          path: root/dist/
