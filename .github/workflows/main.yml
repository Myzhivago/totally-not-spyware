name: Build Totally Not Spyware (iOS ARM)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    # 必须使用 macOS 以调用苹果官方工具链
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Build Environment
        run: |
          # 1. 安装前端资源压缩工具
          brew install closure-compiler
          sudo ln -s /usr/local/bin/closure-compiler /usr/local/bin/closure-js
          
          # 2. 获取 iOS SDK 路径并存入环境变量
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK_PATH=$SDK_PATH" >> $GITHUB_ENV

      # 第一步：编译 curl (使用 DarwinSSL 以适配 iOS)
      - name: Build Curl
        run: |
          CURL_DIR=$(ls -d glue/dep/curl-*)
          cd $CURL_DIR
          
          # 直接使用 xcrun 包装好的编译器，避免路径报错
          export CC="xcrun -sdk iphoneos clang"
          export CFLAGS="-miphoneos-version-min=10.0 -isysroot ${{ env.SDK_PATH }}"
          
          # 编译静态库，禁用不必要的模块以提高成功率
          ./configure --host=arm-apple-darwin \
                      --with-darwinssl \
                      --enable-static \
                      --disable-shared \
                      --disable-verbose \
                      --with-random=/dev/urandom \
                      CC="$CC"
          
          make -j$(sysctl -n hw.ncpu)

      # 第二步：编译 DoubleH3lix 静态库
      - name: Build DoubleH3lix
        run: |
          cd glue/dep/doubleH3lix
          make headless

      # 第三步：编译 Meridian 静态库
      - name: Build Meridian
        run: |
          cd glue/dep/Meridian
          make all

      # 第四步：编译 Payload (glue)
      # 这一步会链接前三步生成的 .a 静态库
      - name: Build Payload
        run: |
          cd glue
          export JIT=1
          make

      # 第五步：最终打包 (root)
      # 处理 HTML 模板、混淆 JS/CSS，并移动文件到 dist 目录
      - name: Final Build for Nginx
        working-directory: ./root
        run: |
          make

      # 第六步：归档并上传产物
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TNS-iOS-Build
          # 该目录下的内容可直接放入 nginx 的网页根目录
          path: root/dist/
