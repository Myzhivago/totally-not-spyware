name: Test Payload Build (Fast Track)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Tools
        run: |
          brew install closure-compiler
          sudo ln -s /usr/local/bin/closure-compiler /usr/local/bin/closure-js

      # 伪造 curl 依赖：创建一个包含空函数的静态库，骗过链接器
      - name: Mock Curl Dependency
        run: |
          cd glue/dep
          CURL_DIR=$(ls -d curl-*)
          mkdir -p $CURL_DIR/lib/.libs
          
          # 创建一个空的 c 文件并编译为 arm64 对象文件
          echo "void mock_curl_func() {}" > mock.c
          xcrun -sdk iphoneos clang -arch arm64 -c mock.c -o mock.o
          
          # 将对象文件打包进静态库
          ar -rc $CURL_DIR/lib/.libs/libcurl.a mock.o
          
          # 尝试编译其他必要的静态库（如果报错也继续，以便测试 payload）
          cd doubleH3lix && make headless || true
          cd ../Meridian && make all || true

      - name: Patch and Build Payload
        run: |
          cd glue
          # 1. 物理创建输出目录
          mkdir -p obj/c obj/c++
          
          # 2. 注入针对 iOS 10.3.3 的补丁
          printf 'extern "C" { int __availability_version_check(int a, char** b) { return 1; } int _availability_version_check(int a, char** b) { return 1; } }\n' > src/compat.cpp
          
          # 3. 预编译补丁 (iOS 10 兼容模式)
          xcrun -sdk iphoneos clang++ -arch arm64 -c src/compat.cpp -o obj/c++/compat.o -miphoneos-version-min=10.0
          
          # 4. 修改 Makefile：注入补丁对象并允许动态符号查找
          sed -i '' 's/$(CXX) $(LDFLAGS) -o $@/$(CXX) $(LDFLAGS) obj\/c++\/compat.o -Wl,-undefined,dynamic_lookup -o $@/g' Makefile
          
          # 5. 执行 Payload 编译
          export JIT=1
          make

      - name: Package Dist
        working-directory: ./root
        run: |
          # 即使前面的步骤产生的是 mock payload，也可以测试打包流程
          make

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Payload-Link-Test
          path: root/dist/
