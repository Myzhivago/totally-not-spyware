name: TNS Full Build (Strict Makefile.arm Logic)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Tools
        run: |
          # 1. 模拟 Final Package 所需的 CSS/JS 工具
          cat << 'EOF' > /usr/local/bin/closure-css
          #!/bin/bash
          while [[ $# -gt 0 ]]; do case $1 in -o) OUT="$2"; shift 2 ;; *) IN="$1"; shift ;; esac; done
          [ -n "$IN" ] && cp "$IN" "$OUT"
          EOF
          chmod +x /usr/local/bin/closure-css
          
          cat << 'EOF' > /usr/local/bin/closure-js
          #!/bin/bash
          while [[ $# -gt 0 ]]; do case $1 in --js_output_file) OUT="$2"; shift 2 ;; *.js) FILES+=("$1"); shift ;; *) shift ;; esac; done
          [ -n "$OUT" ] && cat "${FILES[@]}" > "$OUT"
          EOF
          chmod +x /usr/local/bin/closure-js

      # 2. 严格按照 Makefile.arm 编译 Curl (针对 iOS 10.3.3)
      - name: Build Curl using Makefile.arm
        run: |
          cd glue/dep/curl-*
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          # 提取作者在 Makefile.arm 中定义的变量，并注入现代 SDK 路径
          # 我们锁定 arm64 架构以适配 iPad mini 2
          make -f Makefile.arm \
            CC="xcrun -sdk iphoneos clang" \
            CFLAGS="-arch arm64 -miphoneos-version-min=10.0 -isysroot $SDK_PATH" \
            LDFLAGS="-arch arm64 -isysroot $SDK_PATH" \
            -j$(sysctl -n hw.ncpu)

      - name: Build Libraries
        run: |
          cd glue/dep/doubleH3lix && make headless || true
          cd ../Meridian && make all || true

      - name: Build Payload
        run: |
          cd glue
          mkdir -p obj/c obj/c++
          
          # 注入针对 iOS 10.3.3 的补丁 (解决 Xcode 16 符号检查问题)
          printf 'extern "C" { int __availability_version_check(int a, char** b) { return 1; } }\n' > src/patch.cpp
          xcrun -sdk iphoneos clang++ -arch arm64 -c src/patch.cpp -o obj/c++/patch.o -miphoneos-version-min=10.0
          
          export JIT=1
          # 按照 glue/Makefile 逻辑，合并刚才编译的 curl 静态库
          make OBJS_EXT="obj/c++/patch.o" LDFLAGS="-Wl,-undefined,dynamic_lookup"

      - name: Final Package
        working-directory: ./root
        run: |
          make

      - name: Upload for Linux/armv7 Server
        uses: actions/upload-artifact@v4
        with:
          name: TNS-Strict-Success
          path: root/dist/
