name: Build TNS (Final Fix for JS/CSS)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Build Tools
        run: |
          # 1. 模拟 closure-css：支持 -o 参数，直接复制文件
          cat << 'EOF' > closure-css
          #!/bin/bash
          while [[ $# -gt 0 ]]; do
            case $1 in
              -o) OUTPUT="$2"; shift 2 ;;
              *) INPUT="$1"; shift ;;
            esac
          done
          [ -n "$INPUT" ] && [ -n "$OUTPUT" ] && cp "$INPUT" "$OUTPUT"
          EOF
          chmod +x closure-css
          sudo mv closure-css /usr/local/bin/closure-css

          # 2. 模拟 closure-js：支持 --js_output_file 参数
          # 我们不进行 ECMASCRIPT 转换，直接把所有输入的 JS 文件合并输出
          cat << 'EOF' > closure-js
          #!/bin/bash
          FILES=()
          while [[ $# -gt 0 ]]; do
            case $1 in
              --js_output_file) OUTPUT="$2"; shift 2 ;;
              -O|--language_in|--language_out) shift 2 ;; # 忽略这些压缩参数
              *.js) FILES+=("$1"); shift ;;
              *) shift ;;
            esac
          done
          if [ ${#FILES[@]} -gt 0 ] && [ -n "$OUTPUT" ]; then
            cat "${FILES[@]}" > "$OUTPUT"
            echo "Mock closure-js: Merged ${#FILES[@]} files into $OUTPUT"
          fi
          EOF
          chmod +x closure-js
          sudo mv closure-js /usr/local/bin/closure-js

      - name: Build Mock Dependencies
        run: |
          cd glue/dep
          CURL_DIR=$(ls -d curl-*)
          mkdir -p $CURL_DIR/lib/.libs
          echo "void mock(){}" > mock.c
          xcrun -sdk iphoneos clang -arch arm64 -c mock.c -o mock.o
          ar -rc $CURL_DIR/lib/.libs/libcurl.a mock.o
          cd doubleH3lix && make headless || true
          cd ../Meridian && make all || true

      - name: Build Payload
        run: |
          cd glue
          mkdir -p obj/c obj/c++
          printf 'extern "C" { int __availability_version_check(int a, char** b) { return 1; } }\n' > src/patch.cpp
          xcrun -sdk iphoneos clang++ -arch arm64 -c src/patch.cpp -o obj/c++/patch.o -miphoneos-version-min=10.0
          export JIT=1
          make OBJS_EXT="obj/c++/patch.o" LDFLAGS="-Wl,-undefined,dynamic_lookup"

      - name: Final Package
        working-directory: ./root
        run: |
          # 现在 closure-css 和 closure-js 都能正常工作（虽然是 mock 版本）
          make

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TNS-Success-iPad-mini2
          path: root/dist/
