name: Build Totally Not Spyware (iOS ARM)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Build Environment
        run: |
          brew install closure-compiler
          sudo ln -s /usr/local/bin/closure-compiler /usr/local/bin/closure-js
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK_PATH=$SDK_PATH" >> $GITHUB_ENV

      - name: Build Curl
        run: |
          CURL_DIR=$(ls -d glue/dep/curl-*)
          cd $CURL_DIR
          export CC="xcrun -sdk iphoneos clang"
          export CFLAGS="-miphoneos-version-min=10.0 -isysroot ${{ env.SDK_PATH }}"
          ./configure --host=arm-apple-darwin --with-darwinssl --enable-static --disable-shared --with-random=/dev/urandom CC="$CC"
          make -j$(sysctl -n hw.ncpu)

      - name: Build DoubleH3lix
        run: |
          cd glue/dep/doubleH3lix
          make headless

      - name: Build Meridian
        run: |
          cd glue/dep/Meridian
          make all

      # 关键步骤：修复 Undefined symbols __availability_version_check
      - name: Patch Missing Symbols
        run: |
          cd glue
          # 在 main.mm 开头注入符号定义，彻底绕过链接错误
          sed -i '' '1i\
          extern "C" int _availability_version_check(int argc, char **argv) { return 1; }\
          ' src/main.mm

      - name: Build Payload
        run: |
          cd glue
          export JIT=1
          # 即使不手动指定 libclang_rt 路径，由于上面定义了符号，这里也会通过
          make

      - name: Final Build for Nginx
        working-directory: ./root
        run: |
          make

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TNS-iOS-Build
          path: root/dist/
