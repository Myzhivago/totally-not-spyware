name: TNS Build for iPad mini 2 (iOS 10.3.3)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Tools
        run: |
          brew install closure-compiler
          sudo ln -s /usr/local/bin/closure-compiler /usr/local/bin/closure-js
          echo "SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)" >> $GITHUB_ENV

      # 1. 编译针对 iOS 10 的 Curl - 禁用无关功能以绕过库检测
      - name: Build Curl
        run: |
          cd glue/dep/curl-*
          export SDK_PATH=${{ env.SDK_PATH }}
          # 核心修复：通过禁用不必要的协议并强制指定编译器，避开 gethostbyname 检测
          ./configure --host=arm-apple-darwin \
                      --with-darwinssl \
                      --enable-static \
                      --disable-shared \
                      --disable-ftp --disable-file --disable-ldap --disable-ldaps --disable-rtsp \
                      --disable-proxy --disable-dict --disable-telnet --disable-tftp \
                      --disable-pop3 --disable-imap --disable-smb --disable-smtp --disable-gopher \
                      --disable-manual \
                      CC="xcrun -sdk iphoneos clang -arch arm64 -miphoneos-version-min=10.0 -isysroot $SDK_PATH"
          make -j$(sysctl -n hw.ncpu)

      # 2. 编译越狱库
      - name: Build Libraries
        run: |
          cd glue/dep/doubleH3lix && make headless
          cd ../Meridian && make all

      # 3. 修复 Payload 目录和符号 (解决 __availability_version_check)
      - name: Patch and Build Payload
        run: |
          cd glue
          mkdir -p obj/c obj/c++
          
          # 物理创建补丁文件，覆盖所有报错符号
          printf 'extern "C" { int __availability_version_check(int a, char** b) { return 1; } int _availability_version_check(int a, char** b) { return 1; } }\n' > src/compat.cpp
          
          # 手动编译补丁
          xcrun -sdk iphoneos clang++ -arch arm64 -c src/compat.cpp -o obj/c++/compat.o -miphoneos-version-min=10.0
          
          # 修改 Makefile 注入补丁对象和动态查找开关
          sed -i '' 's/$(CXX) $(LDFLAGS) -o $@/$(CXX) $(LDFLAGS) obj\/c++\/compat.o -Wl,-undefined,dynamic_lookup -o $@/g' Makefile
          
          export JIT=1
          make

      # 4. 生成最终静态页面 (用于 Linux/amd64 服务器部署)
      - name: Final Package
        working-directory: ./root
        run: |
          make

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TNS-iOS10-Dist
          path: root/dist/
