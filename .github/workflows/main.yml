name: Build for iOS 10.3.3 (iPad mini 2)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Environment
        run: |
          brew install closure-compiler
          sudo ln -s /usr/local/bin/closure-compiler /usr/local/bin/closure-js
          echo "SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)" >> $GITHUB_ENV

      # 1. 编译针对 iOS 10 的 curl
      - name: Build Curl
        run: |
          cd glue/dep/curl-*
          # 显式指定 arm64 并将最低版本降至 10.0
          export CC="xcrun -sdk iphoneos clang -arch arm64"
          export CFLAGS="-miphoneos-version-min=10.0 -isysroot ${{ env.SDK_PATH }}"
          ./configure --host=arm-apple-darwin --with-darwinssl --enable-static --disable-shared --with-random=/dev/urandom CC="$CC" CFLAGS="$CFLAGS"
          make -j$(sysctl -n hw.ncpu)

      # 2. 编译静态库
      - name: Build Libraries
        run: |
          cd glue/dep/doubleH3lix && make headless
          cd ../Meridian && make all

      # 3. 核心修复：针对 iOS 10.3.3 的兼容性补丁
      # 强制在源码中定义缺失符号，并告诉链接器这是一个“弱引用”
      - name: Patch for iOS 10 Compatibility
        run: |
          cd glue
          # 创建一个 C++ 文件来承载缺失的符号
          echo 'extern "C" { int __availability_version_check(int argc, char **argv) { return 1; } }' > src/compat.cpp
          # 修改 Makefile 确保编译这个补丁文件
          sed -i '' 's/obj\/c++\/main.o/obj\/c++\/main.o obj\/c++\/compat.o/g' Makefile

      # 4. 编译 Payload
      - name: Build Payload
        run: |
          cd glue
          export JIT=1
          # 手动先编译补丁文件
          xcrun -sdk iphoneos clang++ -arch arm64 -c src/compat.cpp -o obj/c++/compat.o -miphoneos-version-min=10.0
          # 关键参数：-Wl,-undefined,dynamic_lookup 允许符号在运行时由 iOS 10 系统提供
          make LDFLAGS="-Wl,-undefined,dynamic_lookup"

      # 5. 打包前端资源 (用于 Nginx 分发)
      - name: Final Build
        working-directory: ./root
        run: |
          make

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TNS-iOS10-Dist
          path: root/dist/
