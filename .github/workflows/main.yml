name: Build Totally Not Spyware (iOS ARM)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Build Environment
        run: |
          brew install closure-compiler
          sudo ln -s /usr/local/bin/closure-compiler /usr/local/bin/closure-js
          
          # 获取并保存 SDK 路径
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK_PATH=$SDK_PATH" >> $GITHUB_ENV
          
          # 获取编译器运行库所在的目录 (解决 availability 符号错误的关键)
          # 我们需要告诉链接器去哪里找 libclang_rt.ios.a
          LIB_PATH=$(dirname $(xcrun --sdk iphoneos --find clang))/../lib/clang/*/lib/darwin
          echo "CLANG_LIB_PATH=$LIB_PATH" >> $GITHUB_ENV

      - name: Build Curl
        run: |
          CURL_DIR=$(ls -d glue/dep/curl-*)
          cd $CURL_DIR
          export CC="xcrun -sdk iphoneos clang"
          # 增加最低版本要求到 10.0 以匹配项目其他部分
          export CFLAGS="-miphoneos-version-min=10.0 -isysroot ${{ env.SDK_PATH }}"
          ./configure --host=arm-apple-darwin \
                      --with-darwinssl \
                      --enable-static \
                      --disable-shared \
                      --with-random=/dev/urandom \
                      CC="$CC"
          make -j$(sysctl -n hw.ncpu)

      - name: Build DoubleH3lix
        run: |
          cd glue/dep/doubleH3lix
          make headless

      - name: Build Meridian
        run: |
          cd glue/dep/Meridian
          make all

      - name: Build Payload
        run: |
          cd glue
          export JIT=1
          # 核心修复：在 LDFLAGS 中加入 -lclang_rt.ios 
          # 这样链接器就能找到 __availability_version_check
          make LDFLAGS="-L${{ env.CLANG_LIB_PATH }} -lclang_rt.ios"

      - name: Final Build for Nginx
        working-directory: ./root
        run: |
          make

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TNS-iOS-Build
          path: root/dist/
