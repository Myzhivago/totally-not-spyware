name: Build Totally Not Spyware (for Linux/amd64 Nginx)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    # 必须在 macOS 上编译，即使分发服务器是 Linux
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Build Environment
        run: |
          # 安装前端处理工具
          brew install closure-compiler
          sudo ln -s /usr/local/bin/closure-compiler /usr/local/bin/closure-js
          
          # 存储 SDK 路径
          echo "SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)" >> $GITHUB_ENV

      - name: Build Curl (ARM)
        run: |
          CURL_DIR=$(ls -d glue/dep/curl-*)
          cd $CURL_DIR
          export CC="xcrun -sdk iphoneos clang"
          export CFLAGS="-miphoneos-version-min=10.0 -isysroot ${{ env.SDK_PATH }}"
          ./configure --host=arm-apple-darwin --with-darwinssl --enable-static --disable-shared --with-random=/dev/urandom CC="$CC"
          make -j$(sysctl -n hw.ncpu)

      - name: Build Libraries (DoubleH3lix & Meridian)
        run: |
          cd glue/dep/doubleH3lix && make headless
          cd ../Meridian && make all

      # 核心修复：手动注入缺失的符号定义，解决链接报错
      - name: Patch Missing Symbols
        run: |
          cd glue
          # 在 main.mm 开头注入符号定义，绕过新版编译器对 __availability_version_check 的依赖
          sed -i '' '1i\
          extern "C" int __availability_version_check(int argc, char **argv) { return 1; }\
          ' src/main.mm

      - name: Build Payload
        run: |
          cd glue
          export JIT=1
          # 此时编译出的 payload 是给手机跑的 ARM 架构
          make

      - name: Final Build (Frontend & Packaging)
        working-directory: ./root
        run: |
          # 处理 HTML/JS，并将 payload 复制到 dist 目录
          make

      - name: Upload dist for Linux Nginx
        uses: actions/upload-artifact@v4
        with:
          name: TNS-Web-Dist
          # 这里的产物是跨平台的静态网页资源，可直接放进 amd64 Linux 的 nginx
          path: root/dist/
